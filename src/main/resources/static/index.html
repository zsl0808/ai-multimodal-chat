<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 多模态对话</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">🤖</div>
                <h1>AI 多模态对话</h1>
            </div>
            <div class="header-status">
                <span id="connectionStatus" class="status-dot offline"></span>
                <span id="connectionText">未连接</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Panel: Video & Controls -->
            <section class="video-panel">
                <div class="video-container">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div id="videoOverlay" class="video-overlay">
                        <div class="overlay-content">
                            <span class="camera-icon">📷</span>
                            <p>点击下方按钮开启摄像头</p>
                        </div>
                    </div>
                    <!-- Video status badge -->
                    <div id="videoStatus" class="video-status hidden">
                        <span class="recording-dot"></span>
                        <span>AI 正在观看</span>
                    </div>
                </div>

                <!-- Media Controls -->
                <div class="media-controls">
                    <button id="btnToggleCamera" class="control-btn camera-btn" title="开启摄像头">
                        <span class="btn-icon">📷</span>
                        <span class="btn-text">开启摄像头</span>
                    </button>
                    <button id="btnToggleMic" class="control-btn mic-btn" title="开启麦克风">
                        <span class="btn-icon">🎤</span>
                        <span class="btn-text">开启麦克风</span>
                    </button>
                    <button id="btnAnalyze" class="control-btn analyze-btn" title="让 AI 分析当前画面" disabled>
                        <span class="btn-icon">🔍</span>
                        <span class="btn-text">分析画面</span>
                    </button>
                </div>

                <!-- Voice Input Status -->
                <div id="voiceStatus" class="voice-status hidden">
                    <div class="voice-wave">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                    <span id="voiceText">正在聆听...</span>
                </div>
            </section>

            <!-- Right Panel: Chat -->
            <section class="chat-panel">
                <div class="chat-header">
                    <h2>💬 对话</h2>
                    <button id="btnClearChat" class="clear-btn" title="清除对话">🗑️ 清除</button>
                </div>

                <!-- Chat Messages -->
                <div id="chatMessages" class="chat-messages">
                    <div class="message system-message">
                        <div class="message-content">
                            <p>👋 你好！我是你的 AI 助手。</p>
                            <p>你可以：</p>
                            <ul>
                                <li>📷 开启摄像头，让我看到你的画面</li>
                                <li>🎤 开启麦克风，用语音和我对话</li>
                                <li>⌨️ 在下方输入文字与我交流</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="messageInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
                        <button id="btnSend" class="send-btn" title="发送">
                            <span>➤</span>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Hidden canvas for frame capture -->
    <canvas id="captureCanvas" style="display: none;"></canvas>

    <!-- Scripts -->
    <script src="/js/websocket.js?v=2"></script>
    <script src="/js/camera.js?v=2"></script>
    <script src="/js/speech.js?v=2"></script>
    <script src="/js/app.js?v=2"></script>
</body>
</html>
